<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161A">
<title>Edzésterv – 4 nap, 5–9 fókusz, 3 munkasorozat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161A;
    --card:#1C1F26;
    --card-hover:#20242D;
    --line:#2A2E37;
    --ink:#F2F1ED;
    --ink-muted:#8B8F98;
    --ink-faint:#5C616B;

    --push:#FF6B4A;
    --pull:#4AA8FF;
    --leg:#4ADE80;
    --upper:#B98BFA;

    --radius:16px;
    --radius-sm:10px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
  }

  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  /* ---------- Top bar ---------- */
  header.top{
    position:sticky; top:0; z-index:20;
    background:rgba(20,22,26,0.92);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    padding-top:env(safe-area-inset-top);
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-faint); padding:14px 18px 2px;
    font-family:'JetBrains Mono',monospace;
  }
  .tabs{
    display:flex; gap:6px; padding:6px 12px 12px;
  }
  .tab{
    flex:1; text-align:center; padding:10px 4px 9px;
    border-radius:12px; border:1px solid transparent;
    background:transparent; color:var(--ink-muted);
    font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:13px; letter-spacing:.03em;
    cursor:pointer; transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .tab .dot{
    display:block; width:5px; height:5px; border-radius:50%;
    background:var(--ink-faint); margin:0 auto 5px;
    transition:background .15s ease, box-shadow .15s ease;
  }
  .tab.active{ background:var(--card); border-color:var(--accent); color:var(--ink); }
  .tab.active .dot{ background:var(--accent); box-shadow:0 0 8px var(--accent); }

  /* ---------- Day section ---------- */
  main{ max-width:560px; margin:0 auto; padding:18px 14px 0; }
  .day-head{
    display:flex; align-items:flex-end; justify-content:space-between;
    padding:4px 4px 14px; gap:10px;
  }
  .day-head h1{
    margin:0; font-size:26px; line-height:1.05;
    display:flex; align-items:baseline; gap:9px; flex-wrap:wrap;
  }
  .day-head h1 .tag{
    font-size:12px; font-weight:600; padding:3px 9px; border-radius:20px;
    background:color-mix(in srgb, var(--accent) 18%, transparent);
    color:var(--accent); letter-spacing:.02em;
    font-family:'Inter',sans-serif;
  }
  .reset-btn{
    border:1px solid var(--line); background:transparent; color:var(--ink-muted);
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.03em;
    padding:7px 10px; border-radius:9px; white-space:nowrap; cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .reset-btn:active{ border-color:var(--accent); color:var(--accent); }


  /* ---------- Exercise card ---------- */
  .exercise{
    background:var(--card);
    border:1px solid color-mix(in srgb, var(--accent) 30%, var(--line));
    border-left:4px solid var(--accent);
    border-radius:var(--radius); margin-bottom:13px; overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.14);
  }
  .ex-head{
    width:100%; display:flex; align-items:center; gap:10px;
    background:color-mix(in srgb, var(--accent) 11%, var(--card));
    border:none; border-bottom:1px solid transparent; color:var(--ink);
    padding:14px 12px 14px 14px; text-align:left; cursor:pointer; font:inherit;
    transition:background .15s ease, border-color .15s ease;
  }
  .ex-head:active{ background:color-mix(in srgb, var(--accent) 20%, var(--card)); }
  .exercise.open .ex-head{
    background:color-mix(in srgb, var(--accent) 17%, var(--card));
    border-bottom-color:color-mix(in srgb, var(--accent) 30%, var(--line));
  }
  .ex-name{ flex:1; font-size:15px; font-weight:600; line-height:1.3; }
  .ex-sets{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px;
    color:var(--accent); white-space:nowrap;
    background:color-mix(in srgb, var(--accent) 13%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 32%, transparent);
    border-radius:8px; padding:4px 7px;
  }
  .chevron{
    width:28px; height:28px; border-radius:9px;
    background:color-mix(in srgb, var(--accent) 18%, var(--card-hover));
    border:1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
    position:relative; margin-left:2px; flex-shrink:0;
  }
  .chevron::after{
    content:""; position:absolute; left:9px; top:7px; width:7px; height:7px;
    border-right:2px solid var(--accent); border-bottom:2px solid var(--accent);
    transform:rotate(45deg); transition:transform .2s ease, top .2s ease;
  }
  .exercise.open .chevron::after{ transform:rotate(-135deg); top:11px; }

  .ex-body{
    max-height:0; overflow:hidden; transition:max-height .28s ease;
  }
  .ex-body-inner{ padding:0 14px 16px; }

  .frames{ display:flex; gap:8px; margin-bottom:12px; }
  .frame{ flex:1; min-width:0; }
  .frame img{
    width:100%; height:auto; display:block; border-radius:var(--radius-sm);
    background:var(--line); aspect-ratio:1/1; object-fit:cover;
  }
  .frame span{
    display:block; text-align:center; font-size:10px; color:var(--ink-faint);
    margin-top:5px; font-family:'JetBrains Mono',monospace; letter-spacing:.04em; text-transform:uppercase;
  }

  .approx-note{
    font-size:11.5px; color:var(--ink-faint); margin:-4px 0 12px; line-height:1.4;
  }

  /* célizmok */
  .frame.muscle-frame img{
    background:#f4f3ef; object-fit:contain; padding:8px;
  }
  .frame.contain-frame img{
    background:#f4f3ef; object-fit:contain; padding:6px;
  }
  .image-credit{
    font-size:10.5px; color:var(--ink-faint); margin:-4px 0 12px; line-height:1.45;
  }
  .image-credit a{ color:var(--ink-muted); }
  .muscle-note{
    font-size:12.5px; color:var(--ink-muted); line-height:1.5; margin:-4px 0 12px;
  }
  .muscle-note b{ color:var(--ink); font-weight:600; }
  .muscle-note .m-secondary{ color:var(--ink-faint); }

  /* Részletes útmutató */
  .guide-box{
    background:rgba(255,255,255,0.04);
    border-left:3px solid var(--accent);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    margin:0 0 12px;
    font-size:12.5px;
    line-height:1.6;
    color:var(--ink-muted);
  }
  .guide-box strong{ color:var(--ink); font-weight:600; }
  .guide-box .step{ display:block; margin-top:4px; padding-left:12px; position:relative; }
  .guide-box .step::before{ content:"•"; position:absolute; left:0; color:var(--accent); }
  .guide-box .step b{ color:var(--ink); font-weight:600; }

  .tip-note{
    font-size:12px; color:var(--ink-muted); line-height:1.5;
    background:var(--card-hover); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:9px 11px; margin:0 0 12px;
  }
  .tip-note b{ color:var(--accent); font-weight:600; }

  .performance-log{
    margin:10px 0 12px; padding:12px;
    background:rgba(255,255,255,0.035); border:1px solid var(--line);
    border-radius:var(--radius-sm);
  }
  .performance-grid{
    display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px;
  }
  .performance-set{
    min-width:0; padding:9px 7px 8px;
    background:color-mix(in srgb, var(--accent) 7%, var(--bg));
    border:1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
    border-radius:10px;
  }
  .performance-set-title{
    margin:0 0 8px; text-align:center; color:var(--accent);
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700;
    letter-spacing:.035em; text-transform:uppercase;
  }
  .performance-field{ min-width:0; }
  .performance-field + .performance-field{ margin-top:8px; }
  .performance-field label{
    display:block; margin:0 0 5px; color:var(--ink-muted); font-size:12px; font-weight:600;
    line-height:1.25; text-align:center;
  }
  .performance-field input{
    width:100%; min-width:0; padding:9px 4px; background:var(--bg); border:1px solid var(--line);
    border-radius:9px; color:var(--ink); text-align:center; font-family:'JetBrains Mono',monospace;
    font-size:16px; font-weight:600;
  }
  .performance-field input:focus{
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 17%, transparent);
  }
  .performance-field input::placeholder{ color:var(--ink-faint); font-size:10px; font-weight:400; }
  .performance-note{ margin-top:8px; color:var(--ink-faint); font-size:10.5px; line-height:1.45; }
  @media (max-width:350px){
    .performance-log{ padding:10px 8px; }
    .performance-grid{ gap:5px; }
    .performance-set{ padding:8px 4px 7px; }
    .performance-field input{ padding-left:2px; padding-right:2px; }
  }

  .sets-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .set-circle{
    width:40px; height:40px; border-radius:50%; border:1.5px solid var(--line);
    background:transparent; color:var(--ink-muted); font-family:'JetBrains Mono',monospace;
    font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .15s ease; flex-shrink:0;
  }
  .set-circle.done{
    background:var(--accent); border-color:var(--accent); color:#14161A;
  }
  .sets-hint{ font-size:11px; color:var(--ink-faint); margin-left:2px; }



  /* ---------- Edzésfázisok: jól elkülönített blokkok ---------- */
  .phase-panel{
    position:relative;
    margin:0 0 30px;
    padding:14px 12px 12px;
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
  }
  .phase-panel + .phase-panel{ margin-top:30px; }
  .phase-panel::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    border-radius:inherit;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
  }
  .warmup-panel{
    background:linear-gradient(180deg,rgba(255,183,77,.075),rgba(255,255,255,.018));
    border-color:rgba(255,183,77,.24);
  }
  .workout-panel{
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,transparent),rgba(255,255,255,.018));
    border-color:color-mix(in srgb,var(--accent) 34%,var(--line));
    padding-bottom:4px;
  }
  .cooldown-panel{
    background:linear-gradient(180deg,rgba(74,168,255,.07),rgba(255,255,255,.018));
    border-color:rgba(74,168,255,.23);
  }
  .phase-ribbon{
    display:flex;
    align-items:center;
    gap:9px;
    margin:-2px 1px 14px;
    color:var(--ink-muted);
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:.11em;
  }
  .phase-ribbon span{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:30px;
    height:24px;
    border-radius:8px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.08);
    color:var(--ink);
    font-weight:700;
    letter-spacing:.02em;
  }
  .phase-ribbon strong{ font-weight:700; color:var(--ink); }
  .warmup-panel .phase-ribbon strong{ color:#FFD08A; }
  .workout-panel .phase-ribbon strong{ color:var(--accent); }
  .cooldown-panel .phase-ribbon strong{ color:#8DC7FF; }

  .training-block-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin:0 2px 8px;
  }
  .training-block-head h2{
    margin:0;
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    line-height:1.15;
    color:var(--accent);
    font-weight:700;
    letter-spacing:.02em;
  }
  .training-intro{
    margin:0 2px 14px;
    color:var(--ink-muted);
    font-size:11.5px;
    line-height:1.5;
  }
  .workout-panel .ex-list{ margin-top:4px; }
  .workout-panel .exercise:last-child{ margin-bottom:8px; }

  .mobility-list{ margin:0; }
  .mobility-list.cooldown-list{ margin-top:0; }
  .mobility-block-head{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin:0 3px 9px; padding-top:2px;
  }
  .mobility-block-title{
    font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700;
    color:var(--ink); display:flex; align-items:center; gap:7px;
  }
  .mobility-block-time{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint);
    white-space:nowrap;
  }
  .mobility-intro{
    font-size:11.5px; line-height:1.5; color:var(--ink-muted);
    margin:0 3px 9px;
  }
  .mobility-card{
    background:rgba(255,255,255,0.025);
    border:1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
    border-left:4px solid color-mix(in srgb, var(--accent) 76%, white 8%);
    border-radius:13px; margin-bottom:11px; overflow:hidden;
  }
  .mobility-card.complete{ opacity:.72; }
  .mobility-head{
    width:100%; display:flex; align-items:center; gap:9px; padding:11px 10px 11px 12px;
    background:color-mix(in srgb, var(--accent) 7%, rgba(255,255,255,.025));
    border:0; border-bottom:1px solid transparent; color:var(--ink); text-align:left; cursor:pointer;
    font:inherit; transition:background .15s ease, border-color .15s ease;
  }
  .mobility-head:active{ background:color-mix(in srgb, var(--accent) 15%, var(--card-hover)); }
  .mobility-card.open .mobility-head{
    background:color-mix(in srgb, var(--accent) 12%, var(--card));
    border-bottom-color:color-mix(in srgb, var(--accent) 22%, var(--line));
  }
  .mobility-name{ flex:1; font-size:13.5px; line-height:1.35; font-weight:600; }
  .mobility-dose{
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    color:var(--accent); white-space:nowrap;
    background:color-mix(in srgb, var(--accent) 10%, transparent);
    border-radius:7px; padding:3px 6px;
  }
  .mobility-chevron{
    width:26px; height:26px; border-radius:8px;
    background:color-mix(in srgb, var(--accent) 14%, var(--card-hover));
    border:1px solid color-mix(in srgb, var(--accent) 34%, var(--line));
    position:relative; margin:0 1px; flex-shrink:0;
  }
  .mobility-chevron::after{
    content:""; position:absolute; left:8px; top:6px; width:7px; height:7px;
    border-right:2px solid var(--accent); border-bottom:2px solid var(--accent);
    transform:rotate(45deg); transition:transform .2s ease, top .2s ease;
  }
  .mobility-card.open .mobility-chevron::after{ transform:rotate(-135deg); top:10px; }
  .mobility-body{ max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .mobility-body-inner{ padding:0 12px 12px; }
  .mobility-frames{
    display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px;
    margin:0 0 10px;
  }
  .mobility-frames.single{ grid-template-columns:1fr; }
  .mobility-frame{ min-width:0; }
  .mobility-frame img{
    width:100%; aspect-ratio:4/3; display:block; object-fit:contain;
    background:#f4f3ef; border-radius:var(--radius-sm); padding:4px;
  }
  .mobility-frame span{
    display:block; text-align:center; margin-top:4px;
    font-family:'JetBrains Mono',monospace; font-size:9.5px;
    color:var(--ink-faint); letter-spacing:.035em; text-transform:uppercase;
  }
  .mobility-credit{
    font-size:10.25px; line-height:1.45; color:var(--ink-faint);
    margin:-2px 1px 10px;
  }
  .mobility-credit a{ color:var(--ink-muted); }
  .mobility-frame.image-error{ display:none; }
  .mobility-meta{
    display:grid; grid-template-columns:1fr; gap:5px; margin-bottom:9px;
    font-size:11.5px; line-height:1.45; color:var(--ink-muted);
  }
  .mobility-meta b{ color:var(--ink); font-weight:600; }
  .mobility-guide{
    font-size:12px; line-height:1.55; color:var(--ink-muted);
    background:rgba(255,255,255,.035); border-radius:9px; padding:9px 10px;
    margin-bottom:9px;
  }
  .mobility-guide b{ color:var(--accent); }
  .mobility-done{
    display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line);
    background:transparent; color:var(--ink-muted); border-radius:9px;
    padding:7px 10px; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    cursor:pointer;
  }
  .mobility-done.done{
    background:var(--accent); border-color:var(--accent); color:#14161A; font-weight:700;
  }

  footer{
    max-width:560px; margin:22px auto 0; padding:14px 18px 6px;
    font-size:11.5px; color:var(--ink-faint); line-height:1.6; border-top:1px solid var(--line);
  }
  footer a{ color:var(--ink-muted); }
  .backup-actions{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .backup-btn{
    min-height:46px; border-radius:12px;
    border:1px solid color-mix(in srgb,var(--upper) 48%,var(--line));
    background:color-mix(in srgb,var(--upper) 12%,var(--card));
    color:var(--ink); font-family:'Space Grotesk',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer;
  }
  .backup-btn:active{
    background:color-mix(in srgb,var(--upper) 25%,var(--card-hover));
    transform:translateY(1px);
  }
  .backup-file-input{ display:none; }
  .backup-status{
    min-height:18px; margin-top:8px; text-align:center;
    font-size:11px; color:var(--ink-muted);
  }


  /* iOS Safari: 16 px alatti beviteli mező fókusznál automatikusan nagyít. */
  input, select, textarea{
    font-size:16px !important;
  }




  /* ---------- Külön nyújtás fül ---------- */
  .stretch-switch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin:0 2px 16px;
    padding:5px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
  }
  .stretch-switch-btn{
    min-height:44px;
    border:1px solid transparent;
    border-radius:10px;
    background:transparent;
    color:var(--ink-muted);
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  .stretch-switch-btn.active{
    color:var(--ink);
    background:color-mix(in srgb,var(--accent) 18%,var(--card-hover));
    border-color:color-mix(in srgb,var(--accent) 48%,var(--line));
    box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 12%,transparent) inset;
  }
  .stretch-pane{ display:none; }
  .stretch-pane.active{ display:block; }
  .stretch-panel{
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,transparent),rgba(255,255,255,.018));
    border:1px solid color-mix(in srgb,var(--accent) 30%,var(--line));
    border-radius:18px;
    padding:14px 12px 6px;
  }
  .stretch-title{
    margin:0 2px 12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:18px;
    color:var(--ink);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="tabs" id="tabs"></div>
</header>

<main id="main"></main>

<footer class="backup-footer">
  <div class="backup-actions">
    <button type="button" class="backup-btn" id="export-data-btn">EXPORT</button>
    <button type="button" class="backup-btn" id="import-data-btn">IMPORT</button>
  </div>
  <input class="backup-file-input" type="file" id="import-data-input" accept=".json,application/json">
  <div class="backup-status" id="backup-status" role="status" aria-live="polite"></div>
</footer>

<script>
const IMG_BASE = "https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db/exercises/";
const MUSCLE_IMG_BASE = "https://commons.wikimedia.org/wiki/Special:FilePath/";

const MUSCLES = {
  chest:       { hu:"Mellizom",                 img:"Pectoralis_major.png" },

// -------------------- SEGÉDFÜGGVÉNYEK --------------------
function countSets(str){
  const match = str.match(/(\d+)\s*[×xX]/);
  return match ? parseInt(match[1], 10) : 0;
}

function weekKey(d){
  const jan1 = new Date(d.getFullYear(),0,1);
  const dayOfYear = Math.floor((d - jan1)/86400000) + 1;
  const week = Math.ceil((dayOfYear + jan1.getDay())/7);
  return d.getFullYear() + '-W' + week;
}
const WK = weekKey(new Date());

function storeKey(dayKey, exIdx, setIdx){
  return `edzes_v9_${WK}_${dayKey}_${exIdx}_${setIdx}`;
}

function legacyWeightKey(dayKey, exIdx){
  return `weight_v9_${dayKey}_${exIdx}`;
}

function setWeightKey(dayKey, exIdx, setIdx){
  return `set_weight_v11_${dayKey}_${exIdx}_${setIdx}`;
}

function setRepsKey(dayKey, exIdx, setIdx){
  return `set_reps_v10_${dayKey}_${exIdx}_${setIdx}`;
}

function repRangeLabel(str){
  return str.replace(/^\s*\d+\s*[×xX]\s*/, '');
}

function upperReps(str){
  const range = str.match(/×\s*\d+\s*[–-]\s*(\d+)/);
  if(range) return parseInt(range[1], 10);
  const single = str.match(/×\s*(\d+)/);
  return single ? parseInt(single[1], 10) : 0;
}


function mobilityKey(dayKey, phase, idx){
  return `mobility_v2_${WK}_${dayKey}_${phase}_${idx}`;
}

// -------------------- UI ÉPÍTÉS --------------------
const tabsEl = document.getElementById('tabs');
const mainEl = document.getElementById('main');


function renderMobilityBlock(container, items, dayKey, phase){
  if(!container || !Array.isArray(items) || items.length === 0){
    if(container) container.style.display = 'none';
    return;
  }
  container.innerHTML = '';

  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'mobility-card';
    card.dataset.phase = phase;
    card.dataset.mobilityIdx = idx;

    const media = MOBILITY_MEDIA[item.n] || null;
    const mediaImages = media && Array.isArray(media.images) ? media.images.filter(img => img && img.src) : [];
    const mediaHtml = mediaImages.length ? `
      <div class="mobility-frames ${mediaImages.length === 1 ? 'single' : ''}">
        ${mediaImages.map((img, imageIdx) => `
          <div class="mobility-frame">
            <img data-src="${img.src}" alt="${item.n} – ${img.label || `illusztráció ${imageIdx + 1}`}" loading="lazy">
            <span>${img.label || `Illusztráció ${imageIdx + 1}`}</span>
          </div>
        `).join('')}
      </div>
      ${media.credit ? `<div class="mobility-credit">Képforrás: ${media.credit}</div>` : ''}
    ` : '';

    card.innerHTML = `
      <button class="mobility-head" type="button">
        <span class="mobility-name">${item.n}</span>
        <span class="mobility-dose">${item.dose}</span>
        <span class="mobility-chevron"></span>
      </button>
      <div class="mobility-body">
        <div class="mobility-body-inner">
          ${mediaHtml}
          <div class="mobility-meta">
            <div><b>🎯 Mit fejleszt:</b> ${item.target}</div>
            <div><b>Eszköz:</b> ${item.equipment}</div>
          </div>
          <div class="mobility-guide"><b>Végrehajtás:</b> ${item.guide}</div>
          <div class="mobility-guide"><b>Intenzitás:</b> ${item.intensity}</div>
          <button class="mobility-done" type="button" data-day="${dayKey}" data-phase="${phase}" data-idx="${idx}">✓ KÉSZ</button>
        </div>
      </div>
    `;
    const head = card.querySelector('.mobility-head');
    const body = card.querySelector('.mobility-body');
    let imagesLoaded = false;
    head.addEventListener('click', () => {
      const open = card.classList.toggle('open');
      if(open && !imagesLoaded){
        body.querySelectorAll('img[data-src]').forEach(img => {
          img.addEventListener('error', () => {
            const frame = img.closest('.mobility-frame');
            if(frame) frame.classList.add('image-error');
          }, { once:true });
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
        });
        imagesLoaded = true;
      }
      body.style.maxHeight = open ? '2400px' : '0';
    });
    container.appendChild(card);
  });
}

        <div class="ex-body-inner">
          ${weightHtml}
          <div class="sets-row">${circles}<span class="sets-hint">szett</span></div>
          <div class="frames">
            ${exerciseFramesHtml}
            <div class="frame muscle-frame"><img data-src="${muscleImg}" alt="${primaryM.hu} célizom" loading="lazy"><span>Célizom</span></div>
          </div>
          ${ex.approx ? `<div class="approx-note">≈ Nincs pontosan egyező felvétel az adatbázisban — ez a legközelebbi elérhető gép/mozgás.</div>` : ''}
          ${ex.creditHtml ? `<div class="image-credit">${ex.creditHtml}</div>` : ''}
          ${muscleNoteHtml}
          ${guideHtml}
        </div>
      </div>
    `;

    const head = card.querySelector('.ex-head');
    const body = card.querySelector('.ex-body');
    let loaded = false;

    head.addEventListener('click', () => {
      const wasOpen = card.classList.contains('open');

      // Egyszerre csak egy erősítő gyakorlat lehet nyitva.
      document.querySelectorAll('.exercise.open').forEach(otherCard => {
        if(otherCard === card) return;
        otherCard.classList.remove('open');
        const otherBody = otherCard.querySelector('.ex-body');
        if(otherBody) otherBody.style.maxHeight = '0';
      });

      const isOpen = !wasOpen;
      card.classList.toggle('open', isOpen);
      if(isOpen){
        if(!loaded){
          body.querySelectorAll('img[data-src]').forEach(img => {
            img.src = img.dataset.src;
            img.removeAttribute('data-src');
          });
          loaded = true;
        }
        body.style.maxHeight = '1800px';

        // Minden képernyőméreten az Edzésnapló kerüljön a nézet közepére.
        const performanceLog = card.querySelector('.performance-log');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        window.setTimeout(() => {
          performanceLog?.scrollIntoView({
            behavior: reduceMotion ? 'auto' : 'smooth',
            block: 'center',
            inline: 'nearest'
          });
        }, 320);
      } else {
        body.style.maxHeight = '0';

        // A kézzel összecsukott gyakorlat után gördüljön vissza a lap tetejére.
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        window.setTimeout(() => {
          window.scrollTo({
            top: 0,
            behavior: reduceMotion ? 'auto' : 'smooth'
          });
        }, 60);
      }
    });

    list.appendChild(card);
  });

  mainEl.appendChild(section);

  section.querySelector('[data-reset]').addEventListener('click', () => resetDay(day.key));
});

}

// -------------------- SZETTENKÉNTI SÚLYOK BETÖLTÉSE --------------------
document.addEventListener('change', (e) => {
  const input = e.target.closest('.set-weight-input');
  if (!input) return;
  const day = input.dataset.day;
  const exIdx = input.dataset.exIdx;
  const setIdx = input.dataset.setIdx;
  const val = input.value.trim();
  const key = setWeightKey(day, exIdx, setIdx);
  if (val === '') localStorage.removeItem(key); else localStorage.setItem(key, val);
});

function loadSetWeights(dayKey){
  document.querySelectorAll(`#day-${dayKey} .set-weight-input`).forEach(input => {
    const day = input.dataset.day;
    const exIdx = input.dataset.exIdx;
    const setIdx = input.dataset.setIdx;
    const key = setWeightKey(day, exIdx, setIdx);
    let stored = localStorage.getItem(key);

    // Az előző verzió egyetlen közös súlyértékét első megnyitáskor
    // átmásolja mindhárom sorozathoz, hogy a korábbi adat ne vesszen el.
    if (stored === null) {
      const legacy = localStorage.getItem(legacyWeightKey(day, exIdx));
      if (legacy !== null && legacy !== '') {
        stored = legacy;
        localStorage.setItem(key, legacy);
      }
    }
    input.value = stored !== null ? stored : '';
  });
}

});

function loadSetReps(dayKey){

// -------------------- PIPÁK KEZELÉSE --------------------
function refreshProgress(dayKey){
  const day = DATA.find(d => d.key === dayKey);
  const total = day.exercises.reduce((sum,ex)=> sum + countSets(ex.s), 0);
  let done = 0;
  day.exercises.forEach((ex, eIdx) => {
    const n = countSets(ex.s);
    for(let i=0;i<n;i++){
      if(localStorage.getItem(storeKey(dayKey, eIdx, i)) === '1') done++;
    }
  });
  const label = document.getElementById(`label-${dayKey}`);
  if(label) label.textContent = `${done} / ${total} szett`;
}

function applyStoredChecks(dayKey){
  document.querySelectorAll(`#day-${dayKey} .set-circle`).forEach(btn => {
    const key = storeKey(dayKey, btn.dataset.ex, btn.dataset.set);
    btn.classList.toggle('done', localStorage.getItem(key) === '1');
  });
  loadSetWeights(dayKey);
  loadSetReps(dayKey);
  document.querySelectorAll(`#day-${dayKey} .mobility-done`).forEach(btn => {
    const done = localStorage.getItem(mobilityKey(btn.dataset.day, btn.dataset.phase, btn.dataset.idx)) === '1';
    btn.classList.toggle('done', done);
    btn.textContent = done ? '✓ KÉSZ' : '○ JELÖLÉS';
    const card = btn.closest('.mobility-card');
    if(card) card.classList.toggle('complete', done);
  });
  if(DATA.some(day => day.key === dayKey)) refreshProgress(dayKey);
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.set-circle');
  if(!btn) return;
  const dayKey = btn.dataset.day;
  const exIdx = btn.dataset.ex;
  const setIdx = btn.dataset.set;
  const key = storeKey(dayKey, exIdx, setIdx);
  const nowDone = !btn.classList.contains('done');
  btn.classList.toggle('done', nowDone);
  if(nowDone) localStorage.setItem(key, '1'); else localStorage.removeItem(key);
  refreshProgress(dayKey);
});


document.addEventListener('click', (e) => {
  const btn = e.target.closest('.mobility-done');
  if(!btn) return;
  e.stopPropagation();
  const key = mobilityKey(btn.dataset.day, btn.dataset.phase, btn.dataset.idx);
  const done = localStorage.getItem(key) !== '1';
  if(done) localStorage.setItem(key, '1'); else localStorage.removeItem(key);
  btn.classList.toggle('done', done);
  btn.textContent = done ? '✓ KÉSZ' : '○ JELÖLÉS';
  const card = btn.closest('.mobility-card');
  if(card) card.classList.toggle('complete', done);
});

function resetDay(dayKey){
  if(!confirm('Biztosan törlöd a mai pipákat ehhez a naphoz?')) return;
  const day = DATA.find(d => d.key === dayKey);
  day.exercises.forEach((ex, eIdx) => {
    const n = countSets(ex.s);
    for(let i=0;i<n;i++) localStorage.removeItem(storeKey(dayKey, eIdx, i));
  });
  ['warmup','cooldown'].forEach(phase => {
    const items = Array.isArray(day[phase]) ? day[phase] : [];
    items.forEach((_, idx) => localStorage.removeItem(mobilityKey(dayKey, phase, idx)));
  });
  applyStoredChecks(dayKey);
}

// -------------------- NAPVÁLTÁS --------------------
function showDay(dayKey){
  localStorage.setItem('selectedDay', dayKey);
  document.querySelectorAll('.day-section').forEach(section => {
    section.style.display = section.id === 'day-' + dayKey ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === dayKey));
  applyStoredChecks(dayKey);
  window.scrollTo({top:0});
}

// -------------------- EXPORT / IMPORT --------------------
const BACKUP_APP_ID = 'mark-edzesterv';
const BACKUP_VERSION = 1;
const BACKUP_PREFIXES = [
  'edzes_v9_',
  'weight_v9_',
  'set_weight_v11_',
  'set_reps_v10_',
  'mobility_v2_'
];
const BACKUP_EXACT_KEYS = new Set(['selectedDay', 'selectedStretchPane']);

function isWorkoutStorageKey(key){
  return BACKUP_EXACT_KEYS.has(key) || BACKUP_PREFIXES.some(prefix => key.startsWith(prefix));
}

function getWorkoutStorageData(){
  const data = {};
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && isWorkoutStorageKey(key)) data[key] = localStorage.getItem(key);
  }
  return data;
}

function setBackupStatus(message, isError = false){
  const status = document.getElementById('backup-status');
  if(!status) return;
  status.textContent = message;
  status.style.color = isError ? '#ff8b73' : 'var(--ink-muted)';
}

function exportWorkoutData(){
  const now = new Date();
  const datePart = now.toISOString().slice(0, 10);
  const payload = {
    app: BACKUP_APP_ID,
    version: BACKUP_VERSION,
    exportedAt: now.toISOString(),
    data: getWorkoutStorageData()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `edzesterv-mentes-${datePart}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  window.setTimeout(() => URL.revokeObjectURL(url), 1000);
  setBackupStatus('Mentés elkészült.');
}

function validateBackup(payload){
  if(!payload || typeof payload !== 'object') return false;
  if(payload.app !== BACKUP_APP_ID || payload.version !== BACKUP_VERSION) return false;
  if(!payload.data || typeof payload.data !== 'object' || Array.isArray(payload.data)) return false;
  return Object.entries(payload.data).every(([key, value]) =>
    isWorkoutStorageKey(key) && (typeof value === 'string' || value === null)
  );
}

function clearWorkoutStorageData(){
  const keys = [];
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && isWorkoutStorageKey(key)) keys.push(key);
  }
  keys.forEach(key => localStorage.removeItem(key));
}

async function importWorkoutData(file){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!validateBackup(payload)){
      throw new Error('A fájl nem ehhez az edzéstervhez tartozó, érvényes mentés.');
    }
    const count = Object.keys(payload.data).length;
    if(!confirm(`A mentés ${count} adatot tartalmaz. Lecseréled a jelenlegi edzésnapló adatait?`)){
      setBackupStatus('Importálás megszakítva.');
      return;
    }
    clearWorkoutStorageData();
    Object.entries(payload.data).forEach(([key, value]) => {
      if(value !== null) localStorage.setItem(key, value);
    });
    setBackupStatus('Adatok visszaállítva.');
    window.setTimeout(() => window.location.reload(), 350);
  } catch(error){
    setBackupStatus(error.message || 'Az importálás nem sikerült.', true);
  }
}

const exportDataBtn = document.getElementById('export-data-btn');
const importDataBtn = document.getElementById('import-data-btn');
const importDataInput = document.getElementById('import-data-input');

exportDataBtn?.addEventListener('click', exportWorkoutData);
importDataBtn?.addEventListener('click', () => importDataInput?.click());
importDataInput?.addEventListener('change', async () => {
  const file = importDataInput.files?.[0];
  if(file) await importWorkoutData(file);
  importDataInput.value = '';
});
